<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코인 세무 제출용 증빙자료 생성기</title>
  <link href="/style.css" rel="stylesheet" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero-top">
        <p class="eyebrow">서비스명</p>
        <button id="themeToggle" type="button" class="theme-toggle">다크모드</button>
      </div>
      <h1>코인 세무 제출용 증빙자료 생성기</h1>
      <p class="subtitle">거래소 거래내역을 업로드하면 거래를 표준화하고 FIFO 기준 실현손익을 계산하여 세무사 제출용 증빙자료 파일을 생성합니다.</p>
    </header>

    <section class="card">
      <h2>1. CSV 업로드</h2>
      <p class="muted">현재 MVP 지원: Binance Spot Trade History (향후 Bybit/지갑/온체인 확장 예정)</p>
      <div class="upload-row">
        <input id="csvFiles" type="file" accept=".csv,text/csv" multiple />
        <button id="processBtn" type="button">파일 처리</button>
      </div>
      <p id="status" class="status">아직 처리된 파일이 없습니다.</p>
    </section>

    <section class="card stats" id="statsCard" hidden>
      <h2>2. 처리 결과</h2>
      <div class="stats-grid" id="statsGrid"></div>
      <button id="downloadBtn" type="button" disabled>tax_evidence_package.zip 다운로드</button>
    </section>

    <section class="card" id="previewCard" hidden>
      <h2>3. 거래 원장 미리보기</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>시각</th>
              <th>거래소</th>
              <th>거래유형</th>
              <th>거래쌍</th>
              <th>수량</th>
              <th>가격(USDT)</th>
              <th>가격(KRW)</th>
              <th>출처 파일</th>
            </tr>
          </thead>
          <tbody id="ledgerPreview"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script defer src="/main.js"></script>
</body>
</html>
